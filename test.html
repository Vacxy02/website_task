<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT 웹페이지 만들기</title>

  <link rel="stylesheet" href="https://s3.ap-northeast-2.amazonaws.com/materials.spartacodingclub.kr/easygpt/default.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    .hero {
      background-color: #222;
      color: white;
      padding: 100px 0;
      text-align: center;
    }

    /* 이미지 크기 통일 */
    .card-img-top {
      height: 250px;
      object-fit: cover;
    }

    /* 카드 hover 효과 */
    .card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05); /* 살짝 확대 */
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* 그림자 추가 */
    }
  </style>
</head>

<body>

  <!-- Hero 영역 -->
  <div class="hero">
    <div class="container">
      <h1 class="display-4">LDH 사진공유 페이지</h1>
      <p class="lead">사진을 공유합니다</p>
    </div>
  </div>

  <!-- 구성요소 -->
  <div class="container mt-5">
    <div class="row">

      <!-- 카드 1 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.pexels.com/photos/15445955/pexels-photo-15445955.jpeg" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">고요한 바다 풍경</h5>
            <h6 class="card-subtitle mb-2 text-muted">자연사진</h6>
            <p class="card-text">잔잔한 파도와 함께 여유를 느낄 수 있는 아름다운 해변 사진입니다.</p>
          </div>
        </div>
      </div>

      <!-- 카드 2 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.pexels.com/photos/27407866/pexels-photo-27407866.jpeg" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">도시와 바다의 조화</h5>
            <h6 class="card-subtitle mb-2 text-muted">도시풍경</h6>
            <p class="card-text">도시와 자연이 어우러진 멋진 풍경을 담은 사진입니다.</p>
          </div>
        </div>
      </div>

      <!-- 카드 3 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.pexels.com/photos/13262256/pexels-photo-13262256.jpeg" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">감성적인 여행 순간</h5>
            <h6 class="card-subtitle mb-2 text-muted">인물사진</h6>
            <p class="card-text">여행 중 감성을 담아낸 특별한 순간을 기록한 사진입니다.</p>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
